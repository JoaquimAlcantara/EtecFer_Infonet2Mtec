<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de professores</title>
</head>
<body>
    <h1 style="text-align: center;">Cadastrar professor</h1>

    <form th:action="@{/professores/salvar}" method="post" th:object="${professor}">
       
        <input type="hidden" th:field="*{idProfessor}"/>
       
        <label>Nome:</label>
        <input type="text" th:field="*{nomeProfessor}"/>
        <br />

        <label>Telefone:</label>
        <input type="text" th:field="*{telefoneProfessor}"/>
        <br />

        <label>CPF:</label>
        <input type="text" th:field="*{cpfProfessor}"/>
        <br />

        <label>Graduação:</label>
        <input type="text" th:field="*{graduacaoProfessor}"/>
        <br />

        <input type="submit" value="Salvar"/> 

    </form>
   
</body>
</html>
